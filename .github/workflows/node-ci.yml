name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      run-build:
        description: 'Whether to run pnpm build'
        required: false
        type: boolean
        default: true
      run-typecheck:
        description: 'Whether to run pnpx typecheck'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: ${{ inputs.run-typecheck }}
        run: |
          if [ -f "tsconfig.json" ]; then
            pnpx tsc --noEmit
          elif grep -q "typecheck" package.json; then
            pnpm run typecheck
          else
            echo "No tsconfig.json found and no typecheck script. Skipping..."
          fi

      - name: Build
        if: ${{ inputs.run-build }}
        run: |
          if grep -q "\"build\":" package.json; then
            pnpm run build
          else
            echo "No build script found. Skipping..."
          fi

      - name: Lint
        run: |
          if grep -q "\"lint\":" package.json; then
            pnpm run lint
          else
            echo "No lint script found. Skipping..."
          fi
