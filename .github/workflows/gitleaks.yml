name: Gitleaks

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to gitleaks config'
        required: false
        type: string
        default: '.gitleaks.toml'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: ${{ inputs.config-path }}
